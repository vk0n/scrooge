services:
  redis:
    image: redis:7-alpine
    container_name: scrooge-redis
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    container_name: scrooge-bot
    depends_on:
      - redis
    command: ["python", "/app/main.py"]
    working_dir: /runtime
    environment:
      BINANCE_API_KEY: "${BINANCE_API_KEY:-}"
      BINANCE_API_SECRET: "${BINANCE_API_SECRET:-}"
      SCROOGE_REDIS_HOST: "${SCROOGE_REDIS_HOST:-redis}"
      SCROOGE_REDIS_PORT: "${SCROOGE_REDIS_PORT:-6379}"
      SCROOGE_REDIS_DB: "${SCROOGE_REDIS_DB:-0}"
      SCROOGE_CONTROL_QUEUE_KEY: "${SCROOGE_CONTROL_QUEUE_KEY:-scrooge:control:queue}"
      SCROOGE_COMMAND_STATUS_PREFIX: "${SCROOGE_COMMAND_STATUS_PREFIX:-scrooge:control:command:}"
      SCROOGE_COMMAND_STATUS_TTL_SECONDS: "${SCROOGE_COMMAND_STATUS_TTL_SECONDS:-86400}"
      SCROOGE_WS_PUSH_INTERVAL_SECONDS: "${SCROOGE_WS_PUSH_INTERVAL_SECONDS:-2}"
      SCROOGE_WS_LOG_LINES: "${SCROOGE_WS_LOG_LINES:-200}"
      SCROOGE_LIVE_POLL_SECONDS: "${SCROOGE_LIVE_POLL_SECONDS:-60}"
      SCROOGE_CONTROL_POLL_SLICE_SECONDS: "${SCROOGE_CONTROL_POLL_SLICE_SECONDS:-1}"
    volumes:
      - scrooge_runtime:/runtime
      - ./config.yaml:/runtime/config.yaml:ro
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: scrooge-api
    depends_on:
      - bot
      - redis
    environment:
      SCROOGE_GUI_USERNAME: "${SCROOGE_GUI_USERNAME}"
      SCROOGE_GUI_PASSWORD: "${SCROOGE_GUI_PASSWORD}"
      SCROOGE_CONTROL_TOKEN: "${SCROOGE_CONTROL_TOKEN:-}"
      SCROOGE_CONFIG_PATH: "/runtime/config.yaml"
      SCROOGE_STATE_PATH: "/runtime/state.json"
      SCROOGE_LOG_PATH: "/runtime/trading_log.txt"
      SCROOGE_GUI_CORS_ORIGINS: "${SCROOGE_GUI_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
      SCROOGE_REDIS_HOST: "${SCROOGE_REDIS_HOST:-redis}"
      SCROOGE_REDIS_PORT: "${SCROOGE_REDIS_PORT:-6379}"
      SCROOGE_REDIS_DB: "${SCROOGE_REDIS_DB:-0}"
      SCROOGE_CONTROL_QUEUE_KEY: "${SCROOGE_CONTROL_QUEUE_KEY:-scrooge:control:queue}"
      SCROOGE_COMMAND_STATUS_PREFIX: "${SCROOGE_COMMAND_STATUS_PREFIX:-scrooge:control:command:}"
      SCROOGE_COMMAND_STATUS_TTL_SECONDS: "${SCROOGE_COMMAND_STATUS_TTL_SECONDS:-86400}"
    volumes:
      - scrooge_runtime:/runtime
      - ./config.yaml:/runtime/config.yaml
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        INTERNAL_API_BASE_URL: "${INTERNAL_API_BASE_URL:-http://api:8000}"
    container_name: scrooge-frontend
    depends_on:
      - api
    environment:
      INTERNAL_API_BASE_URL: "${INTERNAL_API_BASE_URL:-http://api:8000}"
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-}"
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    container_name: scrooge-proxy
    depends_on:
      - frontend
      - api
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  scrooge_runtime:

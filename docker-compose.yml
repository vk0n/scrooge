services:
  redis:
    image: redis:7-alpine
    container_name: scrooge-redis
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "${SCROOGE_WATCHTOWER_SCOPE:-scrooge}"
    restart: unless-stopped

  bot:
    profiles: ["live"]
    image: "${SCROOGE_BOT_IMAGE:-vk0n/scrooge-bot:latest}"
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    container_name: scrooge-bot
    depends_on:
      - redis
    command: ["python", "/app/main.py"]
    working_dir: /runtime
    environment:
      BINANCE_API_KEY: "${BINANCE_API_KEY:-}"
      BINANCE_API_SECRET: "${BINANCE_API_SECRET:-}"
      SCROOGE_REDIS_HOST: "${SCROOGE_REDIS_HOST:-redis}"
      SCROOGE_REDIS_PORT: "${SCROOGE_REDIS_PORT:-6379}"
      SCROOGE_REDIS_DB: "${SCROOGE_REDIS_DB:-0}"
      SCROOGE_CONTROL_QUEUE_KEY: "${SCROOGE_CONTROL_QUEUE_KEY:-scrooge:control:queue}"
      SCROOGE_COMMAND_STATUS_PREFIX: "${SCROOGE_COMMAND_STATUS_PREFIX:-scrooge:control:command:}"
      SCROOGE_COMMAND_STATUS_TTL_SECONDS: "${SCROOGE_COMMAND_STATUS_TTL_SECONDS:-86400}"
      SCROOGE_LIVE_POLL_SECONDS: "${SCROOGE_LIVE_POLL_SECONDS:-60}"
      SCROOGE_CONTROL_POLL_SLICE_SECONDS: "${SCROOGE_CONTROL_POLL_SLICE_SECONDS:-1}"
      SCROOGE_MARKET_STREAM_ENABLED: "${SCROOGE_MARKET_STREAM_ENABLED:-1}"
      SCROOGE_MARKET_STREAM_PERSIST_INTERVAL_SECONDS: "${SCROOGE_MARKET_STREAM_PERSIST_INTERVAL_SECONDS:-1}"
      SCROOGE_MARKET_STREAM_SETTLE_SECONDS: "${SCROOGE_MARKET_STREAM_SETTLE_SECONDS:-1.5}"
      SCROOGE_USER_STREAM_ENABLED: "${SCROOGE_USER_STREAM_ENABLED:-1}"
      SCROOGE_USER_STREAM_KEEPALIVE_SECONDS: "${SCROOGE_USER_STREAM_KEEPALIVE_SECONDS:-1800}"
      SCROOGE_USER_STREAM_RECONNECT_SECONDS: "${SCROOGE_USER_STREAM_RECONNECT_SECONDS:-5}"
      SCROOGE_USER_STREAM_STALE_AFTER_SECONDS: "${SCROOGE_USER_STREAM_STALE_AFTER_SECONDS:-120}"
      SCROOGE_FUTURES_REST_BASE_URL: "${SCROOGE_FUTURES_REST_BASE_URL:-https://fapi.binance.com}"
      SCROOGE_FUTURES_WS_BASE_URL: "${SCROOGE_FUTURES_WS_BASE_URL:-wss://fstream.binance.com/ws}"
      SCROOGE_DEBUG_STRATEGY_TICKS: "${SCROOGE_DEBUG_STRATEGY_TICKS:-0}"
      SCROOGE_RUNTIME_MODE: "${SCROOGE_RUNTIME_MODE:-live}"
      SCROOGE_STRATEGY_MODE: "${SCROOGE_STRATEGY_MODE:-discrete}"
      SCROOGE_CONFIG_PATH: "${SCROOGE_CONFIG_PATH:-/runtime/config.yaml}"
      SCROOGE_LOG_FILE: "${SCROOGE_LOG_FILE:-/runtime/trading_log.txt}"
      SCROOGE_EVENT_LOG_FILE: "${SCROOGE_EVENT_LOG_FILE:-/runtime/event_history.jsonl}"
      SCROOGE_STATE_FILE: "${SCROOGE_STATE_FILE:-/runtime/state.json}"
      SCROOGE_TRADE_HISTORY_FILE: "${SCROOGE_TRADE_HISTORY_FILE:-/runtime/trade_history.jsonl}"
      SCROOGE_BALANCE_HISTORY_FILE: "${SCROOGE_BALANCE_HISTORY_FILE:-/runtime/balance_history.jsonl}"
      SCROOGE_RUNTIME_CHART_DATASET_PATH: "${SCROOGE_RUNTIME_CHART_DATASET_PATH:-/runtime/chart_dataset.csv}"
    volumes:
      - scrooge_runtime:/runtime
      - ./config.yaml:/runtime/config.yaml:ro
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "${SCROOGE_WATCHTOWER_SCOPE:-scrooge}"
    restart: unless-stopped

  backtest:
    profiles: ["backtest"]
    image: "${SCROOGE_BACKTEST_IMAGE:-vk0n/scrooge-bot:latest}"
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    depends_on:
      - redis
    command: ["sh", "/app/docker/backtest_entrypoint.sh"]
    working_dir: /runtime
    environment:
      BINANCE_API_KEY: "${BINANCE_API_KEY:-}"
      BINANCE_API_SECRET: "${BINANCE_API_SECRET:-}"
      SCROOGE_CONFIG_PATH: "${SCROOGE_BACKTEST_CONFIG_PATH:-/runtime/config.backtest.yaml}"
      SCROOGE_BACKTEST_ROOT: "${SCROOGE_BACKTEST_ROOT:-/runtime/backtests}"
      SCROOGE_REDIS_HOST: "${SCROOGE_REDIS_HOST:-redis}"
      SCROOGE_REDIS_PORT: "${SCROOGE_REDIS_PORT:-6379}"
      SCROOGE_REDIS_DB: "${SCROOGE_REDIS_DB:-0}"
      SCROOGE_CONTROL_QUEUE_KEY: "${SCROOGE_CONTROL_QUEUE_KEY:-scrooge:control:queue}"
      SCROOGE_COMMAND_STATUS_PREFIX: "${SCROOGE_COMMAND_STATUS_PREFIX:-scrooge:control:command:}"
      SCROOGE_COMMAND_STATUS_TTL_SECONDS: "${SCROOGE_COMMAND_STATUS_TTL_SECONDS:-86400}"
      SCROOGE_CHART_SOURCE: "dataset"
      SCROOGE_PUSH_ENABLED: "0"
    volumes:
      - scrooge_runtime:/runtime
      - ./config.backtest.yaml:/runtime/config.backtest.yaml:ro
      - ${SCROOGE_HOST_BACKTEST_ARTIFACTS_DIR:-./backtest_artifacts}:/host_artifacts
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      com.centurylinklabs.watchtower.scope: "${SCROOGE_WATCHTOWER_SCOPE:-scrooge}"
    restart: "no"

  api:
    image: "${SCROOGE_API_IMAGE:-vk0n/scrooge-api:latest}"
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: scrooge-api
    depends_on:
      - redis
    environment:
      SCROOGE_GUI_USERNAME: "${SCROOGE_GUI_USERNAME}"
      SCROOGE_GUI_PASSWORD: "${SCROOGE_GUI_PASSWORD}"
      SCROOGE_CONTROL_TOKEN: "${SCROOGE_CONTROL_TOKEN:-}"
      SCROOGE_CONFIG_PATH: "/runtime/config.yaml"
      SCROOGE_STATE_PATH: "/runtime/state.json"
      SCROOGE_TRADE_HISTORY_PATH: "/runtime/trade_history.jsonl"
      SCROOGE_BALANCE_HISTORY_PATH: "/runtime/balance_history.jsonl"
      SCROOGE_LOG_PATH: "/runtime/trading_log.txt"
      SCROOGE_GUI_CORS_ORIGINS: "${SCROOGE_GUI_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
      SCROOGE_REDIS_HOST: "${SCROOGE_REDIS_HOST:-redis}"
      SCROOGE_REDIS_PORT: "${SCROOGE_REDIS_PORT:-6379}"
      SCROOGE_REDIS_DB: "${SCROOGE_REDIS_DB:-0}"
      SCROOGE_CONTROL_QUEUE_KEY: "${SCROOGE_CONTROL_QUEUE_KEY:-scrooge:control:queue}"
      SCROOGE_COMMAND_STATUS_PREFIX: "${SCROOGE_COMMAND_STATUS_PREFIX:-scrooge:control:command:}"
      SCROOGE_COMMAND_STATUS_TTL_SECONDS: "${SCROOGE_COMMAND_STATUS_TTL_SECONDS:-86400}"
      SCROOGE_WS_PUSH_INTERVAL_SECONDS: "${SCROOGE_WS_PUSH_INTERVAL_SECONDS:-2}"
      SCROOGE_WS_LOG_LINES: "${SCROOGE_WS_LOG_LINES:-200}"
      SCROOGE_CHART_MAX_CANDLES: "${SCROOGE_CHART_MAX_CANDLES:-1500}"
      SCROOGE_CHART_DATASET_MAX_CANDLES: "${SCROOGE_CHART_DATASET_MAX_CANDLES:-10000}"
      SCROOGE_CHART_TIMEOUT_SECONDS: "${SCROOGE_CHART_TIMEOUT_SECONDS:-10}"
      SCROOGE_CHART_SOURCE: "${SCROOGE_CHART_SOURCE:-auto}"
      SCROOGE_CHART_DATASET_PATH: "${SCROOGE_CHART_DATASET_PATH:-/runtime/chart_dataset.csv}"
    volumes:
      - scrooge_runtime:/runtime
      - ./config.yaml:/runtime/config.yaml
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "${SCROOGE_WATCHTOWER_SCOPE:-scrooge}"
    restart: unless-stopped

  frontend:
    image: "${SCROOGE_FRONTEND_IMAGE:-vk0n/scrooge-frontend:latest}"
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        INTERNAL_API_BASE_URL: "${INTERNAL_API_BASE_URL:-http://api:8000}"
    container_name: scrooge-frontend
    depends_on:
      - api
    environment:
      INTERNAL_API_BASE_URL: "${INTERNAL_API_BASE_URL:-http://api:8000}"
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-}"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "${SCROOGE_WATCHTOWER_SCOPE:-scrooge}"
    restart: unless-stopped

  proxy:
    image: "${SCROOGE_PROXY_IMAGE:-nginx:1.27-alpine}"
    container_name: scrooge-proxy
    depends_on:
      - frontend
      - api
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "${SCROOGE_WATCHTOWER_SCOPE:-scrooge}"
    restart: unless-stopped

  watchtower:
    profiles: ["watchtower"]
    image: containrrr/watchtower:latest
    container_name: scrooge-watchtower
    command:
      - "--label-enable"
      - "--scope"
      - "${SCROOGE_WATCHTOWER_SCOPE:-scrooge}"
      - "--interval"
      - "${SCROOGE_WATCHTOWER_POLL_INTERVAL:-300}"
      - "--cleanup"
      - "--rolling-restart"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_HTTP_API_TOKEN: "${SCROOGE_WATCHTOWER_HTTP_API_TOKEN:-}"
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      com.centurylinklabs.watchtower.scope: "${SCROOGE_WATCHTOWER_SCOPE:-scrooge}"
    restart: unless-stopped

volumes:
  scrooge_runtime:

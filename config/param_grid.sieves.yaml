# Wide realtime screening grid around the current winner candidate.
# Goal: map the direction quickly, not polish the final release params.
# Indicator inputs stay fixed in config/compare.sieves.yaml, so this grid
# only explores the structural risk/reward and TP-management knobs.
#
# Candidate count:
#   sl_mult (3) *
#   tp_mult (3) *
#   trail_atr_mult (3) *
#   rsi_extreme_long (2) *
#   rsi_extreme_short (2) *
#   rsi_long_tp_threshold (3) *
#   rsi_short_tp_threshold (3)
# = 972 candidates
#
# Baseline values included:
#   sl_mult: 3.7
#   tp_mult: 1.9
#   trail_atr_mult: 0.04
#   rsi_extreme_long: 90
#   rsi_extreme_short: 10
#   rsi_long_tp_threshold: 58
#   rsi_short_tp_threshold: 42

sl_mult: [3.0, 3.7, 4.6]
tp_mult: [1.5, 1.9, 2.3]
rsi_extreme_long: [85, 90]

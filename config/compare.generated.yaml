base_backtest_config_path: config/backtest.yaml
compare_run_dir: auto
compare_run_root: runtime/compare
compare_parallel: true
compare_max_workers: 10
sieve_stage_keep_ratio: 0.2
sieve_min_stage_avg_win_rate_pct: 30
sieve_auto_advance_single_candidate: true
sieve_preset: btcusdt-three-sieves-v1
base_backtest_overrides:
  execution_mode: simulated
scenarios:
- name: realtime-10s-winner-0001
  overrides:
    strategy_mode: realtime
    backtest_input_mode: agg_trade_stream
    agg_trade_tick_interval: 10s
    indicator_inputs:
      ema: intrabar
      rsi: closed
      bb: closed
      atr: intrabar
    params:
      sl_mult: 3.0
      tp_mult: 1.5
      rsi_extreme_long: 85
      rsi_extreme_short: 10
      rsi_long_open_threshold: 75
      rsi_long_qty_threshold: 35
      rsi_long_tp_threshold: 54
      rsi_long_close_threshold: 70
      rsi_short_open_threshold: 25
      rsi_short_qty_threshold: 65
      rsi_short_tp_threshold: 38
      rsi_short_close_threshold: 30
      trail_atr_mult: 0.02

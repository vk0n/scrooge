base_backtest_config_path: config/backtest.yaml
compare_run_dir: auto
compare_run_root: runtime/compare
compare_parallel: false
compare_max_workers: 1
sieve_stage_keep_ratio: 0.5
sieve_min_stage_avg_win_rate_pct: 50
sieve_auto_advance_single_candidate: true
sieve_preset: btcusdt-three-sieves-v1
base_backtest_overrides:
  execution_mode: simulated
scenarios:
  - name: prod-discrete-closed
    overrides:
      strategy_mode: discrete
      backtest_input_mode: build
      indicator_inputs:
        ema: closed
        rsi: closed
        bb: closed
        atr: closed
